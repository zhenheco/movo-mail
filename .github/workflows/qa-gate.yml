name: QA Gate

on:
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Worker tests
        run: npm run test:workers

  automerge-gate:
    name: automerge-gate
    runs-on: ubuntu-latest
    needs: [checks]
    if: ${{ always() }}
    steps:
      - name: Require checks to pass
        env:
          CHECKS_RESULT: ${{ needs.checks.result }}
        run: |
          if [ "$CHECKS_RESULT" != "success" ]; then
            echo "checks result: $CHECKS_RESULT"
            exit 1
          fi
