name: CI & Deploy

# Secrets are GitHub repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — scoped: Workers Scripts:Edit, D1:Edit, KV:Edit,
#                           R2:Edit, Email Routing:Edit, Zone DNS (worker route).
#   CLOUDFLARE_ACCOUNT_ID — account holding movo.com.my (f9916b95…).
# Never committed. Deploy no-ops when the token is absent (fork / unset) so CI
# stays green and the deploy gate only activates once secrets exist.
#
# Node 24: the db layer + its tests use the built-in node:sqlite module, which
# is unavailable on Node 20 (introduced 22.5, stable 24). CI must match.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "web/**"
      - "migrations/**"
      - "package.json"
      - "package-lock.json"
      - "wrangler.toml"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  deploy-staging:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Deploy to staging
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          npm run build
          npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Skip notice
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "CLOUDFLARE_API_TOKEN not set — skipping staging deploy (CI gate only)."

  deploy-production:
    needs: build-and-test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Deploy to production
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          npm run build
          npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
