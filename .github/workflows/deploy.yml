name: CI & Deploy

# Secrets used here are GitHub repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — scoped to Workers/D1/R2/KV for this account
# Worker runtime secrets (CF_EMAIL_API_KEY, CF_ACCESS_AUD, CF_ACCESS_TEAM_DOMAIN,
# AI_API_KEY) are set out-of-band via `wrangler secret put` and are NOT in CI.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "web/**"
      - "migrations/**"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  pull_request:
    paths:
      - "src/**"
      - "web/**"
      - "migrations/**"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  ci:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  deploy-staging:
    name: Deploy (staging)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env staging

  deploy-production:
    name: Deploy (production)
    needs: ci
    # Production deploys only on a published GitHub Release/tag, gated by the
    # 'production' environment protection rules (required reviewers).
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production
